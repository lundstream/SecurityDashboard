version: "3.8"
services:
  securitydashboard:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - dashboard-data:/app/data
      # Mount your own settings.json to override defaults:
      # - ./settings.json:/app/settings.json:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # GitHub token for AI analysis (GitHub Models API)
      - AI_GITHUB_TOKEN=${AI_GITHUB_TOKEN}
      # Set to 1 to trigger AI analysis on next container start
      - AI_RUN_ON_BOOT=${AI_RUN_ON_BOOT:-0}
      # NVD token for CVE fetching (NVD API)
      - NVD_API_KEY=${NVD_API_KEY}

volumes:
  dashboard-data:
