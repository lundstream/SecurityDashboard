version: "3.8"
services:
  securitydashboard:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - dashboard-data:/app/data
      # Mount your own settings.json to override defaults:
      # - ./settings.json:/app/settings.json:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production

volumes:
  dashboard-data:
